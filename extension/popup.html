<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font: 13px -apple-system, system-ui, sans-serif;
        width: 320px;
        padding: 14px;
        margin: 0;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      .count {
        font-size: 28px;
        font-weight: 700;
        margin: 4px 0 12px;
      }
      button {
        display: block;
        width: 100%;
        padding: 8px;
        margin: 6px 0;
        border: 0;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      #export {
        background: #1a7f37;
        color: #fff;
      }
      #clear {
        background: #eee;
        color: #333;
      }
      .muted {
        color: #777;
        font-size: 11px;
        margin-top: 8px;
      }
      #status {
        color: #1a7f37;
        font-size: 11px;
        min-height: 14px;
        margin-top: 6px;
      }
      #list {
        margin: 10px 0 4px;
        max-height: 320px;
        overflow-y: auto;
      }
      .job {
        padding: 8px 0;
        border-top: 1px solid #eee;
      }
      .job-title {
        font-weight: 600;
        line-height: 1.25;
      }
      .job-sub {
        color: #777;
        font-size: 11px;
        margin: 2px 0 6px;
      }
      .job select {
        width: 100%;
        padding: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 12px;
        background: #fff;
      }
      .empty {
        color: #777;
        font-size: 12px;
        padding: 8px 0;
      }
    </style>
  </head>
  <body>
    <h1>Job Application Tracker</h1>
    <div class="count"><span id="count">0</span> tracked</div>
    <button id="export">Save Excel now</button>
    <button id="clear">Clear all</button>
    <div id="status"></div>
    <div id="list"></div>
    <div class="muted">
      Auto-saves to <b>Downloads/applications.xlsx</b> after each apply.
    </div>
    <script src="popup.js"></script>
  </body>
</html>
